services:
  mcp:
    build: .
    container_name: hermes-mcp
    command: ["npx", "tsx", "examples/hermes/app/mcp-http.ts"]
    ports:
      - "8093:8093"
    env_file:
      - .env.docker
    environment:
      - MCP_PORT=8093
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent:
    build: .
    container_name: hermes
    ports:
      - "8092:8092"
    volumes:
      - hermes-data:/data
      - ./examples/hermes:/app/examples/hermes:ro
    env_file:
      - .env.docker
    environment:
      - PORT=8092
      - PROTO_APP_ROOT=/app/examples/hermes
    depends_on:
      mcp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  hermes-data:
