services:
  mcp:
    build:
      context: .
      args:
        APP_NAME: ${APP_NAME:-minimal}
    container_name: ${APP_NAME:-minimal}-mcp
    command: ["npx", "tsx", "examples/${APP_NAME:-minimal}/app/mcp-http.ts"]
    ports:
      - "8093:8093"
    env_file:
      - .env.docker
    environment:
      - MCP_PORT=8093
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent:
    build:
      context: .
      args:
        APP_NAME: ${APP_NAME:-minimal}
    container_name: ${APP_NAME:-minimal}
    ports:
      - "8092:8092"
    volumes:
      - app-data:/data
    env_file:
      - .env.docker
    environment:
      - PORT=8092
      - PROTO_APP_ROOT=/app/examples/${APP_NAME:-minimal}
      - PROTO_APP_NAME=${APP_NAME:-minimal}
    depends_on:
      mcp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app-data:
