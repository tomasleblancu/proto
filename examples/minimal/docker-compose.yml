services:
  app:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: minimal
    ports:
      - "${PORT:-8092}:${PORT:-8092}"
    volumes:
      - app-data:/data
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8092}
      - PROTO_APP_ROOT=/app
      - PROTO_APP_NAME=minimal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8092}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app-data:
